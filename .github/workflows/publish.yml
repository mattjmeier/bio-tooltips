name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'   # Runs whenever you push a tag like v0.1.0, v1.0.0, etc.

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Update npm for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Test package
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Trigger BioTooltipR vendoring PR
        env:
          BIOTOOLTIPR_DISPATCH_TOKEN: ${{ secrets.BIOTOOLTIPR_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $BIOTOOLTIPR_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mattjmeier/BioTooltipR/dispatches \
            -d "{\"event_type\":\"bio-tooltips-release\",\"client_payload\":{\"version\":\"$VERSION\"}}"
