name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-npm:
    name: Build, Test, and Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing / provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Update npm for trusted publishing
        run: npm install -g npm@11

      - name: Check tag matches package.json version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"

          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::Git tag $TAG does not match package.json version v$VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Test package
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-npm

    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --notes "Published to npm as \`${GITHUB_REF_NAME#v}\`."

  trigger-vendoring:
    name: Trigger BioTooltipR vendoring PR
    runs-on: ubuntu-latest
    needs: publish-npm

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trigger BioTooltipR vendoring PR
        env:
          BIOTOOLTIPR_DISPATCH_TOKEN: ${{ secrets.BIOTOOLTIPR_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $BIOTOOLTIPR_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mattjmeier/BioTooltipR/dispatches \
            -d "{\"event_type\":\"bio-tooltips-release\",\"client_payload\":{\"version\":\"$VERSION\"}}"