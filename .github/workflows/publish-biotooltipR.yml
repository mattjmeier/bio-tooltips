- name: Trigger BioTooltipR vendoring PR
  if: success()
  env:
    BIOTOOLTIPR_DISPATCH_TOKEN: ${{ secrets.BIOTOOLTIPR_DISPATCH_TOKEN }}
  shell: bash
  run: |
    set -euo pipefail
    VERSION="$(node -p "require('./package.json').version")"

    curl -L \
      -X POST \
      -H "Accept: application/vnd.github+json" \
      -H "Authorization: Bearer $BIOTOOLTIPR_DISPATCH_TOKEN" \
      -H "X-GitHub-Api-Version: 2022-11-28" \
      https://api.github.com/repos/mattjmeier/bio-tooltips/dispatches \
      -d "{\"event_type\":\"bio-tooltips-release\",\"client_payload\":{\"version\":\"$VERSION\"}}"